<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Robotic Voice Control Hub - Bedrock AI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Live2D Core Dependencies -->
  <!-- 1. High-Performance 2D WebGL Renderer (Correct browser-ready bundle path for PixiJS v6) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <!-- 2. Official Live2D Cubism 2 Core SDK (for legacy .moc models) -->
  <script src="https://cdn.jsdelivr.net/gh/dylanNew/live2d/webgl/Live2D/lib/live2d.min.js"></script>
  <!-- 3. Pixi-Live2D-Display Adapter (Cubism 2.1 specific build to prevent Cubism 4 runtime check crashes) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display/dist/cubism2.min.js"></script>

  <link rel="stylesheet" href="/src/style.css" />
</head>

<body>
  <div id="app">
    <!-- Web Header with academic logos -->
    <header class="web-header">
      <div class="logo-wrapper left-wrapper">
        <img src="/img/hkiit-logo.png" alt="HKIIT Logo" />
      </div>
      <h1 class="header-title">雲端系統及數據中心管理高級文憑課程</h1>
      <div class="logo-wrapper right-wrapper">
        <img src="/img/it114115-logo.png" alt="IT114115 Logo" />
      </div>
    </header>

    <!-- Glowing status badge chip -->
    <div id="status" class="disconnected">Disconnected</div>

    <!-- Sci-fi AI Hologram Viewport -->
    <div class="hologram-viewport">
      <div class="hud-corners">
        <div class="hud-corner top-left"></div>
        <div class="hud-corner top-right"></div>
        <div class="hud-corner bottom-left"></div>
        <div class="hud-corner bottom-right"></div>
      </div>
      <div class="scanlines"></div>
      
      <!-- Hidden fallback voice-orb to avoid breaking any JS queries -->
      <div id="voice-orb" style="display: none;"></div>

      <!-- Live2D canvas, centered perfectly -->
      <canvas id="live2d-canvas" style="display: none; width: 320px; height: 320px; z-index: 10;"></canvas>

      <div class="viewport-overlay">
        <div class="pulse-ring"></div>
        <span class="avatar-tag">AI CORE ACTIVE</span>
        <div class="version-badge">v1.0.23</div>
      </div>
    </div>

    <!-- Main dialogue history screen -->
    <div id="chat-container"></div>

    <!-- Fixed controls toolbar at the bottom -->
    <div id="controls">
      <div id="robot-selector">
        <label for="robot-select" style="display: none">Select Robot(s):</label>
        <select id="robot-select" multiple size="10" style="display: none">
          <option value="all">All (Robots + Drones + Dogs)</option>
          <option value="all_robots" selected>All Robots (1 - 6)</option>
          <option value="all_drones">All Drones (1 - 2)</option>
          <option value="all_dogs">All Dogs (1 - 3)</option>
          <option value="robot_1">Robot 1</option>
          <option value="robot_2">Robot 2</option>
          <option value="robot_3">Robot 3</option>
          <option value="robot_4">Robot 4</option>
          <option value="robot_5">Robot 5</option>
          <option value="robot_6">Robot 6</option>
          <option value="drone_1">Drone 1</option>
          <option value="drone_2">Drone 2</option>
          <option value="dog_1">Dog 1</option>
          <option value="dog_2">Dog 2</option>
          <option value="dog_3">Dog 3</option>
          <option value="xiaoice_1">Xiaoice 1</option>
        </select>
      </div>
      <button id="start" class="button">Start Streaming</button>
      <button id="stop" class="button" disabled>Stop Streaming</button>
    </div>
  </div>

  <script src="/src/auth-check.js"></script>
  <script type="module" src="/src/robotModal.js"></script>
  <script type="module" src="/src/main.js?v=1.0.23"></script>
</body>

</html>
