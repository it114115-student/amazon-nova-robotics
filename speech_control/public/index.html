<!DOCTYPE html>
<html>
  <head>
    <title>Audio Streaming to Bedrock</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="stylesheet" href="/src/style.css" />
    <script src="/socket.io/socket.io.js"></script>
    <!-- AWS SDK for Cognito -->
    <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1692.0.min.js"></script>
    <!-- Amazon Cognito Identity JS -->
    <script src="https://unpkg.com/amazon-cognito-identity-js@6.3.15/dist/amazon-cognito-identity.min.js"></script>
  </head>

  <body>
    <div id="app">
      <!-- Authentication Modal -->
      <div id="auth-modal" class="modal" style="display: none;">
        <div class="modal-content">
          <h2>Login Required</h2>
          <div id="login-form">
            <div class="form-group">
              <label for="username">Username:</label>
              <input type="text" id="username" placeholder="Enter your username" />
            </div>
            <div class="form-group">
              <label for="password">Password:</label>
              <input type="password" id="password" placeholder="Enter your password" />
            </div>
            <div class="form-buttons">
              <button id="login-btn" class="button">Login</button>
            </div>
            <div id="auth-error" class="error-message" style="display: none;"></div>
          </div>
          
          <!-- New Password Required Form (hidden by default) -->
          <div id="new-password-form" style="display: none;">
            <h3>New Password Required</h3>
            <div class="form-group">
              <label for="new-password">New Password:</label>
              <input type="password" id="new-password" placeholder="Enter new password" />
            </div>
            <div class="form-group">
              <label for="confirm-password">Confirm Password:</label>
              <input type="password" id="confirm-password" placeholder="Confirm new password" />
            </div>
            <div class="form-buttons">
              <button id="set-password-btn" class="button">Set Password</button>
            </div>
            <div id="new-password-error" class="error-message" style="display: none;"></div>
          </div>
        </div>
      </div>

      <!-- User Info Bar -->
      <div id="user-info" style="display: none;">
        <span>Welcome, <span id="user-name"></span></span>
        <button id="logout-btn" class="button-small">Logout</button>
      </div>

      <h1>雲端系統及數據中心管理高級文憑課程</h1>
      <div id="status" class="disconnected">Disconnected</div>
      <div id="chat-container"></div>

      <div id="controls">
        <button id="start" class="button">Start Streaming</button>
        <button id="stop" class="button" disabled>Stop Streaming</button>
        <div id="robot-selector">
          <label for="robot-select" style="display: none"
            >Select Robot(s):</label
          >
          <select id="robot-select" multiple size="8" style="display: none">
            <option value="robot_1">Robot 1</option>
            <option value="robot_2">Robot 2</option>
            <option value="robot_3">Robot 3</option>
            <option value="robot_4">Robot 4</option>
            <option value="robot_5">Robot 5</option>
            <option value="robot_6">Robot 6</option>
            <option value="robot_7">Robot 7</option>
            <option value="robot_8">Robot 8</option>
            <option value="robot_9">Robot 9</option>
            <option value="robot_10">Robot 10</option>
            <option value="all">All</option>
          </select>
        </div>
      </div>
    </div>
    <script type="module" src="/src/robotModal.js"></script>
    <script src="/src/lib/cognito-auth.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
